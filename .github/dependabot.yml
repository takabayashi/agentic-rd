version: 2
updates:
  # App runtime + test dependencies (pinned in app/requirements.txt).
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Lint/format tooling (requirements-dev.txt at repo root).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Base image pins in the webapp Dockerfile.
  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly

  # Pinned GitHub Actions in workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
