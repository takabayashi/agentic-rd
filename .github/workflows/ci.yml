name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs that need more opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
      - name: Install lint tooling
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
      - name: Install yamllint
        run: pip install -r requirements-dev.txt
      - name: Lint YAML
        run: yamllint .

  hadolint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: app/Dockerfile

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
      - name: Install app dependencies
        run: pip install -r app/requirements.txt
      - name: Run pytest
        working-directory: app
        run: pytest -q

  connect-lint:
    name: Connect config lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Lint Connect pipelines
        run: make connect-lint
      - name: Run Connect Bloblang tests
        run: make connect-test

  build:
    name: Docker build (compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build images
        run: docker compose build

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan repository history
        run: gitleaks detect --redact --verbose
