# Ruff config — lint + format for the Python web app.
# Kept intentionally small; CI runs `ruff check` and `ruff format --check`.
line-length = 100
target-version = "py312"

# Editor/venv artifacts; the image and tests live under app/.
extend-exclude = [".venv", "app/.pytest_cache"]

[lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "W",  # pycodestyle warnings
    "I",  # import sorting (isort)
    "UP", # pyupgrade
    "B",  # flake8-bugbear
]

[lint.per-file-ignores]
# render.py is mostly embedded CSS/HTML string literals where wrapping lines to
# 100 cols would hurt readability rather than help.
"app/triage/render.py" = ["E501"]
