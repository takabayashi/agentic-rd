services:
  postgres:
    image: postgres:16.14
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      # Local-only default; change it for any non-throwaway use (see README).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      # Schema + seed run once, on first init of an empty data dir.
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiki} -d ${POSTGRES_DB:-wiki}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # One-shot: apply Alembic migrations (forward schema evolution) before the app
  # and the classify sink start. Idempotent — the initial revision is a no-op on
  # a volume already bootstrapped by db/init.sql, then records the baseline.
  migrate:
    build:
      context: ./app
    image: agentic-rd-webapp:0.0.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wiki}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  webapp:
    build:
      context: ./app
    image: agentic-rd-webapp:0.0.0
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      # Built from POSTGRES_* so .env stays optional; app reads DATABASE_URL only.
      DATABASE_URL: postgresql://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wiki}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ollama:
    image: ollama/ollama:0.30.6
    environment:
      # Set OLLAMA_DEBUG=1 in .env for verbose request/inference logs.
      OLLAMA_DEBUG: ${OLLAMA_DEBUG:-0}
    volumes:
      # Persist pulled models so they survive restarts (avoids re-download).
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # One-shot: preload the model so Connect never races a cold "model not found".
  ollama-pull:
    image: ollama/ollama:0.30.6
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ${OLLAMA_ADDRESS:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    # Same host mapping as `connect`, so the documented host-Ollama override
    # (OLLAMA_ADDRESS=http://host.docker.internal:11434) also lets the pull job
    # reach a host-native Ollama; otherwise the hostname doesn't resolve here.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$$OLLAMA_MODEL\""]
    restart: "no"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.15
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      # Cap memory so redpanda doesn't auto-grab the whole VM. dev-container
      # tolerates a small footprint; the Docker VM still needs enough RAM for
      # the full stack (Docker Desktop defaults are fine; ~1.9 GB Colima OOMs).
      - --memory=1G
      - --reserve-memory=0M
      - --default-log-level=warn
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    volumes:
      - redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # Browse the topics at http://localhost:8090 (host 8090 -> container 8080).
  console:
    image: docker.redpanda.com/redpandadata/console:v3.7.4
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # One-shot: create topics with explicit configs before Connect produces.
  # raw/enriched/classified = compacted (LWW by rev_id); model.audit = append-only.
  # `|| true` keeps it idempotent across restarts (topic already exists).
  redpanda-topics:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.15
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        rpk topic create wiki.edits.raw -c cleanup.policy=compact -X brokers=redpanda:9092 || true;
        rpk topic create wiki.edits.enriched -c cleanup.policy=compact -X brokers=redpanda:9092 || true;
        rpk topic create wiki.edits.classified -c cleanup.policy=compact -X brokers=redpanda:9092 || true;
        rpk topic create wiki.edits.dead_letter -c cleanup.policy=delete -c retention.ms=86400000 -X brokers=redpanda:9092 || true;
        rpk topic create model.audit -c cleanup.policy=delete -c retention.ms=21600000 -X brokers=redpanda:9092 || true
    restart: "no"

  # Staged pipeline: ingest -> raw -> enrich -> enriched -> classify -> sink.
  connect-ingest: &connect-base
    image: docker.redpanda.com/redpandadata/connect:4.95.0
    command: run /connect/ingest.yaml
    volumes:
      - ./connect/ingest.yaml:/connect/ingest.yaml:ro
    environment: &connect-env
      WIKI_USER_AGENT: ${WIKI_USER_AGENT:-agentic-rd/0.1 (https://github.com/takabayashi/agentic-rd)}
      REDPANDA_BROKERS: redpanda:9092
      # Connect logger.level interpolates this; INFO default, set DEBUG/TRACE to crank up verbosity.
      CONNECT_LOG_LEVEL: ${CONNECT_LOG_LEVEL:-INFO}
    extra_hosts: &connect-hosts
      - "host.docker.internal:host-gateway"
    depends_on:
      redpanda-topics:
        condition: service_completed_successfully
    restart: unless-stopped

  connect-enrich:
    <<: *connect-base
    command: run /connect/enrich.yaml
    volumes:
      - ./connect/enrich.yaml:/connect/enrich.yaml:ro
    environment:
      <<: *connect-env
      # Diff truncation cap (chars) and MediaWiki compare-API politeness limit.
      DIFF_MAX_CHARS: ${DIFF_MAX_CHARS:-4000}
      WIKI_RATE_LIMIT: ${WIKI_RATE_LIMIT:-10}

  connect-classify:
    <<: *connect-base
    command: run /connect/classify.yaml
    ports:
      # Connect Prometheus metrics (+ health) for the classify stage.
      # Target-only mapping: Docker assigns a random host port per replica so
      # `docker compose scale connect-classify=N` works without port conflicts.
      - "4195"
    volumes:
      - ./connect/classify.yaml:/connect/classify.yaml:ro
      # Shared Bloblang library imported by the pass-1/pass-2 result_maps.
      - ./connect/lib:/connect/lib:ro
    environment:
      <<: *connect-env
      OLLAMA_ADDRESS: ${OLLAMA_ADDRESS:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.7}
      POSTGRES_DSN: postgres://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wiki}?sslmode=disable
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      redpanda-topics:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  ollama:
  redpanda:
