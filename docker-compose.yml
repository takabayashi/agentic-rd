services:
  postgres:
    image: postgres:16.14
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      # Local-only default; change it for any non-throwaway use (see README).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      # Schema + seed run once, on first init of an empty data dir.
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiki} -d ${POSTGRES_DB:-wiki}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  webapp:
    build:
      context: ./app
    image: agentic-rd-webapp:0.0.0
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      # Built from POSTGRES_* so .env stays optional; app reads DATABASE_URL only.
      DATABASE_URL: postgresql://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wiki}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ollama:
    image: ollama/ollama:0.30.6
    volumes:
      # Persist pulled models so they survive restarts (avoids re-download).
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # One-shot: preload the model so Connect never races a cold "model not found".
  ollama-pull:
    image: ollama/ollama:0.30.6
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ${OLLAMA_ADDRESS:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$$OLLAMA_MODEL\""]
    restart: "no"

  connect:
    image: docker.redpanda.com/redpandadata/connect:4.95.0
    command: run /connect/wikipedia.yaml
    volumes:
      - ./connect/wikipedia.yaml:/connect/wikipedia.yaml:ro
    environment:
      # Wikipedia 403s without a descriptive User-Agent (see .env.example).
      WIKI_USER_AGENT: ${WIKI_USER_AGENT:-agentic-rd/0.1 (https://github.com/takabayashi/agentic-rd)}
      OLLAMA_ADDRESS: ${OLLAMA_ADDRESS:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    # Lets the documented host-Ollama override resolve everywhere (set
    # OLLAMA_ADDRESS=http://host.docker.internal:11434 to use a host GPU).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
