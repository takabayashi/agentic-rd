services:
  webapp:
    build:
      context: ./app
    image: agentic-rd-webapp:0.0.0
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
